<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LaunchBase overview</title>
  <desc id="desc">A Supabase-powered launch operations starter with public launch page, account onboarding, and admin dashboard.</desc>
  <rect width="1440" height="900" rx="32" fill="#0B0F0D"/>
  <circle cx="1170" cy="112" r="260" fill="#3ECF8E" fill-opacity="0.18"/>
  <circle cx="196" cy="786" r="260" fill="#3ECF8E" fill-opacity="0.10"/>
  <path d="M80 72C80 49.9 97.9 32 120 32H1320C1342.1 32 1360 49.9 1360 72V828C1360 850.1 1342.1 868 1320 868H120C97.9 868 80 850.1 80 828V72Z" fill="#111713" stroke="#26352E"/>
  <rect x="112" y="64" width="1216" height="64" rx="18" fill="#17211C" stroke="#26352E"/>
  <circle cx="144" cy="96" r="7" fill="#FF5F57"/>
  <circle cx="168" cy="96" r="7" fill="#FFBD2E"/>
  <circle cx="192" cy="96" r="7" fill="#28C840"/>
  <text x="232" y="102" fill="#E7F8EF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">LaunchBase</text>
  <text x="1100" y="101" fill="#9BCFB8" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600">Supabase Auth + RLS</text>
  <text x="136" y="190" fill="#3ECF8E" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="3">OPEN-SOURCE LAUNCH OPS</text>
  <text x="136" y="246" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">Build your startup launch OS</text>
  <text x="136" y="307" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">on Supabase in a weekend.</text>
  <text x="136" y="358" fill="#B5C8BD" font-family="Inter, Arial, sans-serif" font-size="21">A practical starter for founders and developers who need a waitlist,</text>
  <text x="136" y="389" fill="#B5C8BD" font-family="Inter, Arial, sans-serif" font-size="21">feature requests, votes, roadmap, changelog, auth, and admin RLS.</text>
  <rect x="136" y="438" width="190" height="52" rx="14" fill="#3ECF8E"/>
  <text x="174" y="471" fill="#06100B" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Run locally</text>
  <rect x="344" y="438" width="210" height="52" rx="14" fill="#101713" stroke="#3B5548"/>
  <text x="382" y="471" fill="#E7F8EF" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Open demo</text>
  <rect x="610" y="180" width="626" height="434" rx="28" fill="#0F1F19" stroke="#315C48"/>
  <rect x="642" y="218" width="562" height="312" rx="18" fill="#17241D" stroke="#2A4B3C"/>
  <rect x="674" y="254" width="498" height="178" rx="18" fill="#0B0F0D" stroke="#3ECF8E" stroke-opacity="0.55"/>
  <path d="M704 392C780 318 841 362 902 310C967 255 1054 266 1140 298V432H704V392Z" fill="#3ECF8E" fill-opacity="0.18"/>
  <path d="M704 392C780 318 841 362 902 310C967 255 1054 266 1140 298" stroke="#3ECF8E" stroke-width="5" stroke-linecap="round"/>
  <text x="704" y="290" fill="#E7F8EF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Drop in your own product image</text>
  <text x="704" y="322" fill="#90A99A" font-family="Inter, Arial, sans-serif" font-size="15">Hero media slot, dashboard screenshot, or public roadmap capture</text>
  <rect x="674" y="460" width="150" height="42" rx="12" fill="#3ECF8E"/>
  <rect x="844" y="460" width="150" height="42" rx="12" fill="#23362D"/>
  <rect x="1014" y="460" width="150" height="42" rx="12" fill="#23362D"/>
  <text x="680" y="580" fill="#9BCFB8" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Customizable via src/config/landing-page.ts</text>
  <rect x="136" y="646" width="272" height="128" rx="20" fill="#17211C" stroke="#26352E"/>
  <text x="164" y="690" fill="#3ECF8E" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">PUBLIC PAGE</text>
  <text x="164" y="726" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Waitlist + roadmap</text>
  <text x="164" y="754" fill="#A9BCB1" font-family="Inter, Arial, sans-serif" font-size="15">Anyone can join and read.</text>
  <rect x="432" y="646" width="272" height="128" rx="20" fill="#17211C" stroke="#26352E"/>
  <text x="460" y="690" fill="#3ECF8E" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">ACCOUNT</text>
  <text x="460" y="726" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Auth onboarding</text>
  <text x="460" y="754" fill="#A9BCB1" font-family="Inter, Arial, sans-serif" font-size="15">Profile row created by trigger.</text>
  <rect x="728" y="646" width="272" height="128" rx="20" fill="#17211C" stroke="#26352E"/>
  <text x="756" y="690" fill="#3ECF8E" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">ADMIN</text>
  <text x="756" y="726" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Launch operations</text>
  <text x="756" y="754" fill="#A9BCB1" font-family="Inter, Arial, sans-serif" font-size="15">Owners see PII and drafts.</text>
  <rect x="1024" y="646" width="272" height="128" rx="20" fill="#17211C" stroke="#26352E"/>
  <text x="1052" y="690" fill="#3ECF8E" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">SUPABASE</text>
  <text x="1052" y="726" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">RLS by default</text>
  <text x="1052" y="754" fill="#A9BCB1" font-family="Inter, Arial, sans-serif" font-size="15">No service role in the app.</text>
</svg>
